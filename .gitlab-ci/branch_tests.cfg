[Global]
parallel: true
recover: 4
openstack_flavor_name: UNIVENTION-8V-8-100s
extra_label: ucsschool-kelvin-rest-api-branch-test-[ENV:CI_COMMIT_REF_SLUG]

environment:
 CI_JOB_TOKEN=[ENV:CI_JOB_TOKEN]
 CI_SERVER_HOST=[ENV:CI_SERVER_HOST]
 CI_PROJECT_PATH=[ENV:CI_PROJECT_PATH]
 CI_COMMIT_REF_NAME=[ENV:CI_COMMIT_REF_NAME]
 CI_PROJECT_NAME=[ENV:CI_PROJECT_NAME]
 COVERAGE_LIMIT=[ENV:COVERAGE_LIMIT]

[singleserver]
openstack_image_name: [ENV:TARGET_VERSION]-dev-ucsschool-singleserver
command1:
 . utils.sh && add_tech_key_authorized_keys
 . utils.sh && basic_setup
 . utils.sh && basic_setup_ucs_joined [SELF_IP]
command2:
 git clone --depth 1 --branch ${CI_COMMIT_REF_NAME} https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
 systemctl start univention-directory-manager-rest.service
 cd ${CI_PROJECT_NAME} && .gitlab-ci/prepare_test_vm.sh
 docker run --rm --volume $PWD/${CI_PROJECT_NAME}:/repo --workdir /repo --net host --env COVERAGE_LIMIT=${COVERAGE_LIMIT} --env UV_LINK_MODE=copy gitregistry.knut.univention.de/univention/dev/tooling/ci-components/uv make test-ci
command3:
 mkdir -p results/
 cp -r ${CI_PROJECT_NAME}/allure-results results
 cp -r ${CI_PROJECT_NAME}/report_*.xml results
 cp -r ${CI_PROJECT_NAME}/coverage_*.xml results
 LOCAL "$VMUTILSPATH"/utils/utils-local.sh fetch-files root@[SELF_IP] results .
command4:
 LOCAL echo "done"
